<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios - SEDER</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex items-center gap-3">
          <a href="/dashboard" class="w-10 h-10 rounded-lg bg-indigo-600 flex items-center justify-center hover:bg-indigo-700">
            <span class="text-white font-bold text-lg">S</span>
          </a>
          <div>
            <h1 class="text-lg font-bold text-gray-900">Usuarios</h1>
            <p class="text-xs text-gray-500">Gestión de usuarios del sistema</p>
          </div>
        </div>
        <button onclick="logout()" class="px-4 py-2 text-sm text-gray-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition">Cerrar Sesión</button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <div class="flex justify-between items-center mb-6">
      <div class="flex gap-3 flex-1 max-w-md">
        <input type="text" id="searchInput" placeholder="Buscar por usuario o email..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:border-transparent">
      </div>
      <button onclick="abrirFormulario()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-medium">+ Nuevo Usuario</button>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-gray-50 border-b">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Usuario</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Email</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Rol</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Estado</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Miembro</th>
              <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase">Acciones</th>
            </tr>
          </thead>
          <tbody id="usuariosTableBody" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>
      <div id="tableLoading" class="text-center py-8 text-gray-400">Cargando...</div>
    </div>
  </main>

  <div id="modal" class="fixed inset-0 bg-black/50 hidden z-50 items-center justify-center">
    <div class="bg-white rounded-2xl w-full max-w-lg mx-4">
      <div class="p-6 border-b">
        <h3 id="modalTitle" class="text-lg font-bold text-gray-900">Nuevo Usuario</h3>
      </div>
      <form id="usuarioForm" class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre de Usuario *</label>
          <input type="text" id="Nombre_Usuario" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email *</label>
          <input type="email" id="Email" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
        </div>
        <div id="passwordField">
          <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña *</label>
          <input type="password" id="Password" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Rol *</label>
          <select id="ID_Rol" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400"></select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Asociar a Miembro</label>
          <select id="ID_Miembro" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
            <option value="">-- Sin asociar --</option>
          </select>
        </div>
        <label class="flex items-center gap-2">
          <input type="checkbox" id="Activo" checked class="rounded border-gray-300 text-indigo-600">
          <span class="text-sm text-gray-700">Usuario activo</span>
        </label>
      </form>
      <div class="p-6 border-t bg-gray-50 flex justify-end gap-3 rounded-b-2xl">
        <button onclick="cerrarModal()" class="px-4 py-2 text-gray-700 hover:bg-gray-200 rounded-lg transition">Cancelar</button>
        <button onclick="guardarUsuario()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';
    let editandoId = null;

    function logout() { localStorage.clear(); window.location.href = '/'; }

    async function cargarUsuarios(q = '') {
      const url = q ? `/api/usuarios?q=${encodeURIComponent(q)}` : '/api/usuarios';
      const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { logout(); return; }
      const data = await res.json();
      document.getElementById('usuariosTableBody').innerHTML = data.map(u => `
        <tr class="hover:bg-gray-50">
          <td class="px-4 py-3 text-sm font-medium text-gray-900">${u.Nombre_Usuario}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${u.Email}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${u.Rol_Nombre}</td>
          <td class="px-4 py-3"><span class="px-2 py-1 text-xs font-medium rounded-full ${u.Activo ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${u.Activo ? 'Activo' : 'Inactivo'}</span></td>
          <td class="px-4 py-3 text-sm text-gray-600">${u.Miembro_Nombre || '-'}</td>
          <td class="px-4 py-3 text-right">
            <button onclick="editarUsuario(${u.ID_Usuario})" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium mr-3">Editar</button>
            <button onclick="toggleActivo(${u.ID_Usuario})" class="text-yellow-600 hover:text-yellow-800 text-sm font-medium mr-3">${u.Activo ? 'Desactivar' : 'Activar'}</button>
            <button onclick="eliminarUsuario(${u.ID_Usuario})" class="text-red-600 hover:text-red-800 text-sm font-medium">Eliminar</button>
          </td>
        </tr>
      `).join('');
      document.getElementById('tableLoading').classList.add('hidden');
    }

    async function cargarRoles() {
      const res = await fetch('/api/roles', { headers: { Authorization: `Bearer ${token}` } });
      if (res.ok) {
        const roles = await res.json();
        const sel = document.getElementById('ID_Rol');
        sel.innerHTML = roles.map(r => `<option value="${r.ID_Rol}">${r.Nombre_Rol}</option>`).join('');
      }
    }

    async function cargarMiembros() {
      try {
        const res = await fetch('/api/miembros', { headers: { Authorization: `Bearer ${token}` } });
        if (res.ok) {
          const miembros = await res.json();
          const sel = document.getElementById('ID_Miembro');
          sel.innerHTML = '<option value="">-- Sin asociar --</option>' +
            miembros.map(m => `<option value="${m.ID_Miembro}">${m.Nombres} ${m.Apellidos}</option>`).join('');
        }
      } catch(e) {}
    }

    function abrirFormulario(data = null) {
      editandoId = data ? data.ID_Usuario : null;
      document.getElementById('modalTitle').textContent = data ? 'Editar Usuario' : 'Nuevo Usuario';
      document.getElementById('Nombre_Usuario').value = data ? data.Nombre_Usuario : '';
      document.getElementById('Email').value = data ? data.Email : '';
      document.getElementById('Password').required = !data;
      document.getElementById('passwordField').style.display = data ? 'none' : 'block';
      document.getElementById('ID_Rol').value = data ? data.ID_Rol : '';
      document.getElementById('Activo').checked = data ? data.Activo : true;
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    function cerrarModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('modal').classList.remove('flex');
      editandoId = null;
    }

    async function guardarUsuario() {
      const body = {
        Nombre_Usuario: document.getElementById('Nombre_Usuario').value,
        Email: document.getElementById('Email').value,
        ID_Rol: parseInt(document.getElementById('ID_Rol').value),
        Activo: document.getElementById('Activo').checked,
        ID_Miembro: parseInt(document.getElementById('ID_Miembro').value) || null,
      };

      if (!editandoId) {
        body.Password = document.getElementById('Password').value;
      }

      const url = editandoId ? `/api/usuarios/${editandoId}` : '/api/usuarios';
      const method = editandoId ? 'PUT' : 'POST';

      // For PUT, send only changed fields
      if (editandoId) {
        if (!body.Password) delete body.Password;
      }

      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(body),
      });
      if (!res.ok) { const err = await res.json(); alert(err.detail || 'Error al guardar'); return; }
      cerrarModal();
      cargarUsuarios(document.getElementById('searchInput').value);
    }

    async function editarUsuario(id) {
      const res = await fetch(`/api/usuarios/${id}`, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) return;
      const data = await res.json();
      // Also set ID_Miembro from data
      document.getElementById('ID_Miembro').value = data.ID_Miembro || '';
      abrirFormulario(data);
    }

    async function toggleActivo(id) {
      const res = await fetch(`/api/usuarios/${id}/toggle-activo`, { method: 'PUT', headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { alert('Error al cambiar estado'); return; }
      cargarUsuarios(document.getElementById('searchInput').value);
    }

    async function eliminarUsuario(id) {
      if (!confirm('¿Eliminar este usuario?')) return;
      const res = await fetch(`/api/usuarios/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { const err = await res.json(); alert(err.detail || 'Error al eliminar'); return; }
      cargarUsuarios(document.getElementById('searchInput').value);
    }

    document.getElementById('searchInput').addEventListener('input', e => cargarUsuarios(e.target.value));
    cargarRoles();
    cargarMiembros();
    cargarUsuarios();
  </script>
</body>
</html>
