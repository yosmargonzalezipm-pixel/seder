<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roles - SEDER</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex items-center gap-3">
          <a href="/dashboard" class="w-10 h-10 rounded-lg bg-indigo-600 flex items-center justify-center hover:bg-indigo-700">
            <span class="text-white font-bold text-lg">S</span>
          </a>
          <div>
            <h1 class="text-lg font-bold text-gray-900">Roles y Permisos</h1>
            <p class="text-xs text-gray-500">Gestión de roles y asignación de permisos</p>
          </div>
        </div>
        <button onclick="logout()" class="px-4 py-2 text-sm text-gray-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition">Cerrar Sesión</button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-xl font-bold text-gray-900">Roles</h2>
      <button onclick="abrirFormulario()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-medium">+ Nuevo Rol</button>
    </div>
    <div id="rolesContainer" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
  </main>

  <div id="modal" class="fixed inset-0 bg-black/50 hidden z-50 items-center justify-center">
    <div class="bg-white rounded-2xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">
      <div class="p-6 border-b">
        <h3 id="modalTitle" class="text-lg font-bold text-gray-900">Nuevo Rol</h3>
      </div>
      <form id="rolForm" class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre del Rol *</label>
          <input type="text" id="Nombre_Rol" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
          <textarea id="Descripcion" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400"></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-3">Permisos</label>
          <div id="permisosGrid" class="grid grid-cols-2 gap-2"></div>
        </div>
      </form>
      <div class="p-6 border-t bg-gray-50 flex justify-end gap-3 rounded-b-2xl">
        <button onclick="cerrarModal()" class="px-4 py-2 text-gray-700 hover:bg-gray-200 rounded-lg transition">Cancelar</button>
        <button onclick="guardarRol()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';
    let editandoId = null;
    let todosPermisos = [];

    function logout() { localStorage.clear(); window.location.href = '/'; }

    async function cargarRoles() {
      const res = await fetch('/api/roles', { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { logout(); return; }
      const roles = await res.json();
      const container = document.getElementById('rolesContainer');
      container.innerHTML = roles.map(r => `
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
          <div class="flex justify-between items-start mb-3">
            <div>
              <h3 class="font-bold text-gray-900">${r.Nombre_Rol}</h3>
              <p class="text-sm text-gray-500">${r.Descripcion || 'Sin descripción'}</p>
            </div>
            <div class="flex gap-2">
              <button onclick="editarRol(${r.ID_Rol})" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">Editar</button>
              <button onclick="eliminarRol(${r.ID_Rol})" class="text-red-600 hover:text-red-800 text-sm font-medium">Eliminar</button>
            </div>
          </div>
          <div class="flex flex-wrap gap-1">
            ${r.permisos.map(pid => {
              const p = todosPermisos.find(pp => pp.ID_Permiso === pid);
              return p ? `<span class="px-2 py-0.5 bg-indigo-50 text-indigo-700 text-xs rounded-full">${p.Nombre_Permiso}</span>` : '';
            }).join('')}
          </div>
        </div>
      `).join('');
    }

    async function cargarPermisos() {
      const res = await fetch('/api/roles/permisos', { headers: { Authorization: `Bearer ${token}` } });
      if (res.ok) {
        todosPermisos = await res.json();
      }
    }

    function renderPermisosCheckbox(selectedIds = []) {
      const grid = document.getElementById('permisosGrid');
      const agrupados = {};
      todosPermisos.forEach(p => {
        const grupo = p.Nombre_Permiso.split('.')[0];
        if (!agrupados[grupo]) agrupados[grupo] = [];
        agrupados[grupo].push(p);
      });

      grid.innerHTML = Object.entries(agrupados).map(([grupo, perms]) => `
        <div class="border border-gray-200 rounded-lg p-3">
          <p class="text-xs font-semibold text-gray-500 uppercase mb-2">${grupo}</p>
          ${perms.map(p => `<label class="flex items-center gap-2 py-0.5">
            <input type="checkbox" value="${p.ID_Permiso}" ${selectedIds.includes(p.ID_Permiso) ? 'checked' : ''} class="rounded border-gray-300 text-indigo-600">
            <span class="text-sm text-gray-700">${p.Nombre_Permiso}</span>
          </label>`).join('')}
        </div>
      `).join('');
    }

    function abrirFormulario(data = null) {
      editandoId = data ? data.ID_Rol : null;
      document.getElementById('modalTitle').textContent = data ? 'Editar Rol' : 'Nuevo Rol';
      document.getElementById('Nombre_Rol').value = data ? data.Nombre_Rol : '';
      document.getElementById('Descripcion').value = data ? (data.Descripcion || '') : '';
      renderPermisosCheckbox(data ? data.permisos : []);
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    function cerrarModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('modal').classList.remove('flex');
      editandoId = null;
    }

    function getPermisosSeleccionados() {
      return Array.from(document.querySelectorAll('#permisosGrid input[type="checkbox"]:checked')).map(cb => parseInt(cb.value));
    }

    async function guardarRol() {
      const body = {
        Nombre_Rol: document.getElementById('Nombre_Rol').value,
        Descripcion: document.getElementById('Descripcion').value || null,
        permisos: getPermisosSeleccionados(),
      };
      const url = editandoId ? `/api/roles/${editandoId}` : '/api/roles';
      const res = await fetch(url, {
        method: editandoId ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(body),
      });
      if (!res.ok) { const err = await res.json(); alert(err.detail || 'Error al guardar'); return; }
      cerrarModal();
      cargarRoles();
    }

    async function editarRol(id) {
      const res = await fetch(`/api/roles/${id}`, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) return;
      abrirFormulario(await res.json());
    }

    async function eliminarRol(id) {
      if (!confirm('¿Eliminar este rol?')) return;
      const res = await fetch(`/api/roles/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { const err = await res.json(); alert(err.detail || 'Error al eliminar'); return; }
      cargarRoles();
    }

    (async () => {
      await cargarPermisos();
      cargarRoles();
    })();
  </script>
</body>
</html>
