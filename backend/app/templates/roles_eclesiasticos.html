<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roles Eclesiásticos - SEDER</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex items-center gap-3">
          <a href="/dashboard" class="w-10 h-10 rounded-lg bg-indigo-600 flex items-center justify-center hover:bg-indigo-700">
            <span class="text-white font-bold text-lg">S</span>
          </a>
          <div>
            <h1 class="text-lg font-bold text-gray-900">Roles Eclesiásticos</h1>
            <p class="text-xs text-gray-500">Gestión de roles y asignación a miembros</p>
          </div>
        </div>
        <button onclick="logout()" class="px-4 py-2 text-sm text-gray-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition">Cerrar Sesión</button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <div class="flex justify-between items-center mb-6">
      <div class="flex gap-3 flex-1 max-w-md">
        <input type="text" id="searchInput" placeholder="Buscar rol..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:border-transparent">
      </div>
      <button onclick="abrirFormulario()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-medium">+ Nuevo Rol</button>
    </div>

    <div id="rolesContainer" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
  </main>

  <div id="modal" class="fixed inset-0 bg-black/50 hidden z-50 items-center justify-center">
    <div class="bg-white rounded-2xl w-full max-w-lg mx-4">
      <div class="p-6 border-b">
        <h3 id="modalTitle" class="text-lg font-bold text-gray-900">Nuevo Rol Eclesiástico</h3>
      </div>
      <form id="rolForm" class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
          <input type="text" id="Nombre_Rol" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
          <textarea id="Descripcion" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400"></textarea>
        </div>
      </form>
      <div class="p-6 border-t bg-gray-50 flex justify-end gap-3 rounded-b-2xl">
        <button onclick="cerrarModal()" class="px-4 py-2 text-gray-700 hover:bg-gray-200 rounded-lg transition">Cancelar</button>
        <button onclick="guardarRol()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';
    let editandoId = null;
    let _rolesData = [];

    function logout() { localStorage.clear(); window.location.href = '/'; }

    async function cargarRoles(q = '') {
      const url = '/api/roles-eclesiasticos' + (q ? `?q=${encodeURIComponent(q)}` : '');
      const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { logout(); return; }
      _rolesData = await res.json();
      const container = document.getElementById('rolesContainer');
      container.innerHTML = await Promise.all(_rolesData.map(async r => {
        const miembrosRes = await fetch(`/api/roles-eclesiasticos/miembro?rol_id=${r.ID_Rol}`, { headers: { Authorization: `Bearer ${token}` } });
        let miembrosHtml = '<p class="text-xs text-gray-400">Sin miembros asignados</p>';
        return `<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
          <div class="flex justify-between items-start mb-3">
            <div>
              <h3 class="font-bold text-gray-900">${r.Nombre_Rol}</h3>
              <p class="text-sm text-gray-500">${r.Descripcion || 'Sin descripción'}</p>
              <p class="text-xs text-gray-400 mt-1">${r.Total_Miembros} miembro(s) asignados</p>
            </div>
            <div class="flex gap-2">
              <button onclick="editarRol(${r.ID_Rol})" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">Editar</button>
              <button onclick="eliminarRol(${r.ID_Rol})" class="text-red-600 hover:text-red-800 text-sm font-medium">Eliminar</button>
            </div>
          </div>
          <div class="border-t pt-3 mt-2">
            <div class="flex items-center gap-2 mb-2">
              <select id="miembroSelect_${r.ID_Rol}" class="flex-1 px-2 py-1 text-sm border border-gray-300 rounded-lg">
                <option value="">Seleccionar miembro...</option>
              </select>
              <button onclick="asignarMiembro(${r.ID_Rol})" class="px-3 py-1 bg-indigo-100 text-indigo-700 rounded-lg text-sm hover:bg-indigo-200">+</button>
            </div>
            <div id="miembros_${r.ID_Rol}">${miembrosHtml}</div>
          </div>
        </div>`;
      })).then(r => r.join(''));
    }

    async function cargarMiembrosGlobal() {
      try {
        const res = await fetch('/api/miembros', { headers: { Authorization: `Bearer ${token}` } });
        if (res.ok) {
          const miembrosData = await res.json();
          window._miembrosGlobal = miembrosData;
          document.querySelectorAll('[id^="miembroSelect_"]').forEach(sel => {
            sel.innerHTML = '<option value="">Seleccionar miembro...</option>' +
              miembrosData.map(m => `<option value="${m.ID_Miembro}">${m.Nombres} ${m.Apellidos}</option>`).join('');
          });
        }
      } catch(e) {}
    }

    function abrirFormulario(data = null) {
      editandoId = data ? data.ID_Rol : null;
      document.getElementById('modalTitle').textContent = data ? 'Editar Rol Eclesiástico' : 'Nuevo Rol Eclesiástico';
      document.getElementById('Nombre_Rol').value = data ? data.Nombre_Rol : '';
      document.getElementById('Descripcion').value = data ? (data.Descripcion || '') : '';
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    function cerrarModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('modal').classList.remove('flex');
      editandoId = null;
    }

    async function guardarRol() {
      const body = {
        Nombre_Rol: document.getElementById('Nombre_Rol').value,
        Descripcion: document.getElementById('Descripcion').value || null,
      };
      const url = editandoId ? `/api/roles-eclesiasticos/${editandoId}` : '/api/roles-eclesiasticos';
      const res = await fetch(url, {
        method: editandoId ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(body),
      });
      if (!res.ok) { const err = await res.json(); alert(err.detail || 'Error al guardar'); return; }
      cerrarModal();
      cargarRoles(document.getElementById('searchInput').value);
    }

    async function editarRol(id) {
      const r = _rolesData.find(x => x.ID_Rol === id);
      if (r) abrirFormulario(r);
    }

    async function eliminarRol(id) {
      if (!confirm('¿Eliminar este rol?')) return;
      const res = await fetch(`/api/roles-eclesiasticos/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { const err = await res.json(); alert(err.detail || 'Error al eliminar'); return; }
      cargarRoles(document.getElementById('searchInput').value);
    }

    async function asignarMiembro(rolId) {
      const sel = document.getElementById(`miembroSelect_${rolId}`);
      const miembroId = parseInt(sel.value);
      if (!miembroId) return;
      const res = await fetch(`/api/roles-eclesiasticos/miembro/${miembroId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ ID_Rol: rolId }),
      });
      if (!res.ok) { const err = await res.json(); alert(err.detail || 'Error al asignar'); return; }
      cargarRoles(document.getElementById('searchInput').value);
    }

    document.getElementById('searchInput').addEventListener('input', e => cargarRoles(e.target.value));
    cargarMiembrosGlobal();
    cargarRoles();
  </script>
</body>
</html>
