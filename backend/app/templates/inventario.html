<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario - SEDER</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex items-center gap-3">
          <a href="/dashboard" class="w-10 h-10 rounded-lg bg-indigo-600 flex items-center justify-center hover:bg-indigo-700">
            <span class="text-white font-bold text-lg">S</span>
          </a>
          <div>
            <h1 class="text-lg font-bold text-gray-900">Inventario</h1>
            <p class="text-xs text-gray-500">Gestión de bienes y activos de la iglesia</p>
          </div>
        </div>
        <button onclick="logout()" class="px-4 py-2 text-sm text-gray-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition">
          Cerrar Sesión
        </button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <div class="flex justify-between items-center mb-6">
      <div class="flex gap-3 flex-1 max-w-md">
        <input type="text" id="searchInput" placeholder="Buscar por nombre, marca o serie..."
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400 focus:border-transparent">
      </div>
      <button onclick="abrirFormulario()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition font-medium">
        + Nuevo Artículo
      </button>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-gray-50 border-b">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Artículo</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Categoría</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Marca</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Modelo</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">N° Serie</th>
              <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase">Cant.</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Ubicación</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Iglesia</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Estado</th>
              <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase">Resguardos</th>
              <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase">Acciones</th>
            </tr>
          </thead>
          <tbody id="inventarioTableBody" class="divide-y divide-gray-100">
          </tbody>
        </table>
      </div>
      <div id="tableLoading" class="text-center py-8 text-gray-400">Cargando...</div>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 bg-black/50 hidden z-50 items-center justify-center">
    <div class="bg-white rounded-2xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">
      <div class="p-6 border-b">
        <h3 id="modalTitle" class="text-lg font-bold text-gray-900">Nuevo Artículo</h3>
      </div>
      <form id="articuloForm" class="p-6 space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre del Artículo *</label>
            <input type="text" id="Nombre_Articulo" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Categoría *</label>
            <select id="ID_Categoria" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400"></select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Iglesia</label>
            <select id="ID_Iglesia" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400"></select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Marca</label>
            <input type="text" id="Marca" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Modelo</label>
            <input type="text" id="Modelo" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Número de Serie</label>
            <input type="text" id="Numero_Serie" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Cantidad</label>
            <input type="number" id="Cantidad" value="1" min="1" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Estado</label>
            <select id="Estado_Articulo" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400">
              <option value="Excelente">Excelente</option>
              <option value="Bueno">Bueno</option>
              <option value="Requiere Mantenimiento">Requiere Mantenimiento</option>
              <option value="Dañado">Dañado</option>
            </select>
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Ubicación</label>
            <select id="Tipo_Ubicacion" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400">
              <option value="En el Templo">En el Templo</option>
              <option value="En Resguardo Externo (Casa del miembro)">En Resguardo Externo</option>
              <option value="En Tránsito">En Tránsito</option>
            </select>
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
            <textarea id="Descripcion" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400"></textarea>
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Ubicación Interna (ej. Oficina pastoral, Salón principal)</label>
            <input type="text" id="Ubicacion_Interna" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400">
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Responsable (Miembro que resguarda)</label>
            <select id="ID_Miembro_Resguarda" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400">
              <option value="">-- Sin responsable --</option>
            </select>
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Ubicación Detallada</label>
            <textarea id="Ubicacion_Detallada" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400" placeholder="Dirección completa si está en resguardo externo..."></textarea>
          </div>
        </div>
      </form>
      <div class="p-6 border-t bg-gray-50 flex justify-end gap-3 rounded-b-2xl">
        <button onclick="cerrarModal()" class="px-4 py-2 text-gray-700 hover:bg-gray-200 rounded-lg transition">Cancelar</button>
        <button onclick="guardarArticulo()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';

    let editandoId = null;

    function logout() { localStorage.clear(); window.location.href = '/'; }

    async function cargarInventario(q = '') {
      const url = q ? `/api/inventario?q=${encodeURIComponent(q)}` : '/api/inventario';
      const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
      if (!res.ok) { logout(); return; }
      const data = await res.json();
      const tbody = document.getElementById('inventarioTableBody');
      tbody.innerHTML = data.map(a => `
        <tr class="hover:bg-gray-50">
          <td class="px-4 py-3 text-sm font-medium text-gray-900">${a.Nombre_Articulo}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${a.Categoria}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${a.Marca || '-'}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${a.Modelo || '-'}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${a.Numero_Serie || '-'}</td>
          <td class="px-4 py-3 text-sm text-center font-semibold">${a.Cantidad}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${a.Tipo_Ubicacion || '-'}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${a.Iglesia || '-'}</td>
          <td class="px-4 py-3"><span class="px-2 py-1 text-xs font-medium rounded-full ${a.Estado_Articulo === 'Excelente' ? 'bg-green-100 text-green-700' : a.Estado_Articulo === 'Bueno' ? 'bg-blue-100 text-blue-700' : 'bg-yellow-100 text-yellow-700'}">${a.Estado_Articulo}</span></td>
          <td class="px-4 py-3 text-center">
            <a href="/resguardos?articulo_id=${a.ID_Articulo}" class="inline-flex items-center gap-1 text-xs font-medium text-indigo-600 hover:text-indigo-800 bg-indigo-50 hover:bg-indigo-100 px-2.5 py-1 rounded-lg transition">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
              Ver
            </a>
          </td>
          <td class="px-4 py-3 text-right">
            <button onclick="editarArticulo(${a.ID_Articulo})" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium mr-3">Editar</button>
            <button onclick="eliminarArticulo(${a.ID_Articulo})" class="text-red-600 hover:text-red-800 text-sm font-medium">Eliminar</button>
          </td>
        </tr>
      `).join('');
      document.getElementById('tableLoading').classList.add('hidden');
    }

    async function cargarCatalogos() {
      const [cats, iglesias] = await Promise.all([
        fetch('/api/catalogos/categorias', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()),
        fetch('/api/catalogos/iglesias', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()),
      ]);
      document.getElementById('ID_Categoria').innerHTML = cats.map(c => `<option value="${c.value}">${c.label}</option>`).join('');
      document.getElementById('ID_Iglesia').innerHTML = iglesias.map(i => `<option value="${i.value}">${i.label}</option>`).join('');
    }

    async function cargarMiembrosGlobal() {
      try {
        const res = await fetch('/api/miembros', { headers: { Authorization: `Bearer ${token}` } });
        if (res.ok) {
          const miembros = await res.json();
          const sel = document.getElementById('ID_Miembro_Resguarda');
          sel.innerHTML = '<option value="">-- Sin responsable --</option>' +
            miembros.map(m => `<option value="${m.ID_Miembro}">${m.Nombres} ${m.Apellidos}</option>`).join('');
        }
      } catch(e) {}
    }

    function abrirFormulario(data = null) {
      editandoId = data ? data.ID_Articulo : null;
      document.getElementById('modalTitle').textContent = data ? 'Editar Artículo' : 'Nuevo Artículo';
      document.getElementById('Nombre_Articulo').value = data ? data.Nombre_Articulo : '';
      document.getElementById('Marca').value = data ? (data.Marca || '') : '';
      document.getElementById('Modelo').value = data ? (data.Modelo || '') : '';
      document.getElementById('Numero_Serie').value = data ? (data.Numero_Serie || '') : '';
      document.getElementById('Cantidad').value = data ? data.Cantidad : 1;
      document.getElementById('Estado_Articulo').value = data ? data.Estado_Articulo : 'Bueno';
      document.getElementById('Tipo_Ubicacion').value = data ? data.Tipo_Ubicacion : 'En el Templo';
      document.getElementById('Descripcion').value = data ? (data.Descripcion || '') : '';
      document.getElementById('Ubicacion_Interna').value = data ? (data.Ubicacion_Interna || '') : '';
      document.getElementById('ID_Miembro_Resguarda').value = data ? (data.ID_Miembro_Resguarda || '') : '';
      document.getElementById('Ubicacion_Detallada').value = data ? (data.Ubicacion_Detallada || '') : '';
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    function cerrarModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('modal').classList.remove('flex');
      editandoId = null;
    }

    async function guardarArticulo() {
      const body = {
        ID_Iglesia: parseInt(document.getElementById('ID_Iglesia').value) || 1,
        ID_Categoria: parseInt(document.getElementById('ID_Categoria').value) || 1,
        Nombre_Articulo: document.getElementById('Nombre_Articulo').value,
        Marca: document.getElementById('Marca').value || null,
        Modelo: document.getElementById('Modelo').value || null,
        Numero_Serie: document.getElementById('Numero_Serie').value || null,
        Cantidad: parseInt(document.getElementById('Cantidad').value) || 1,
        Estado_Articulo: document.getElementById('Estado_Articulo').value,
        Tipo_Ubicacion: document.getElementById('Tipo_Ubicacion').value,
        Descripcion: document.getElementById('Descripcion').value || null,
        Ubicacion_Interna: document.getElementById('Ubicacion_Interna').value || null,
        ID_Miembro_Resguarda: parseInt(document.getElementById('ID_Miembro_Resguarda').value) || null,
        Ubicacion_Detallada: document.getElementById('Ubicacion_Detallada').value || null,
      };

      const url = editandoId ? `/api/inventario/${editandoId}` : '/api/inventario';
      const method = editandoId ? 'PUT' : 'POST';

      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body),
      });

      if (!res.ok) { alert('Error al guardar'); return; }
      cerrarModal();
      cargarInventario(document.getElementById('searchInput').value);
    }

    async function editarArticulo(id) {
      const res = await fetch(`/api/inventario/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (!res.ok) return;
      const data = await res.json();
      abrirFormulario(data);
    }

    async function eliminarArticulo(id) {
      if (!confirm('¿Eliminar este artículo?')) return;
      const res = await fetch(`/api/inventario/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
      if (!res.ok) { alert('Error al eliminar'); return; }
      cargarInventario(document.getElementById('searchInput').value);
    }

    document.getElementById('searchInput').addEventListener('input', e => {
      cargarInventario(e.target.value);
    });

    cargarCatalogos();
    cargarMiembrosGlobal();
    cargarInventario();
  </script>
</body>
</html>
