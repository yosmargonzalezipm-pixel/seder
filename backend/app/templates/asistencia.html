<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asistencia - SEDER</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex items-center gap-3">
          <a href="/dashboard" class="w-10 h-10 rounded-lg bg-indigo-600 flex items-center justify-center hover:bg-indigo-700">
            <span class="text-white font-bold text-lg">S</span>
          </a>
          <div>
            <h1 class="text-lg font-bold text-gray-900">Asistencia</h1>
            <p class="text-xs text-gray-500">Registro de asistencia a eventos</p>
          </div>
        </div>
        <button onclick="logout()" class="px-4 py-2 text-sm text-gray-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition">Cerrar Sesión</button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <div class="flex flex-wrap gap-3 items-center justify-between mb-6">
      <div class="flex gap-3 flex-1 max-w-md">
        <input type="text" id="searchInput" placeholder="Buscar por miembro..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:border-transparent">
      </div>
      <div class="flex gap-2 items-center">
        <input type="date" id="filtroDesde" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
        <input type="date" id="filtroHasta" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
        <button onclick="cargarAsistencia()" class="px-3 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 text-sm">Filtrar</button>
        <button onclick="abrirFormulario()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-medium">+ Nuevo Registro</button>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-gray-50 border-b">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Miembro</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Fecha</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Evento</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Estado</th>
              <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase">Acciones</th>
            </tr>
          </thead>
          <tbody id="asistenciaTableBody" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>
      <div id="tableLoading" class="text-center py-8 text-gray-400">Cargando...</div>
    </div>
  </main>

  <div id="modal" class="fixed inset-0 bg-black/50 hidden z-50 items-center justify-center">
    <div class="bg-white rounded-2xl w-full max-w-lg mx-4">
      <div class="p-6 border-b">
        <h3 id="modalTitle" class="text-lg font-bold text-gray-900">Nuevo Registro de Asistencia</h3>
      </div>
      <form id="asistenciaForm" class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Miembro *</label>
          <select id="ID_Miembro" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400"></select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Fecha *</label>
          <input type="date" id="Fecha" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de Evento *</label>
          <select id="Tipo_Evento" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
            <option value="Culto Dominical">Culto Dominical</option>
            <option value="Estudio Bíblico">Estudio Bíblico</option>
            <option value="Oración">Oración</option>
            <option value="Evento Especial">Evento Especial</option>
            <option value="Reunión">Reunión</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Estado *</label>
          <select id="Estado_Asistencia" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
            <option value="Presente">Presente</option>
            <option value="Ausente">Ausente</option>
            <option value="Justificado">Justificado</option>
          </select>
        </div>
      </form>
      <div class="p-6 border-t bg-gray-50 flex justify-end gap-3 rounded-b-2xl">
        <button onclick="cerrarModal()" class="px-4 py-2 text-gray-700 hover:bg-gray-200 rounded-lg transition">Cancelar</button>
        <button onclick="guardarAsistencia()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';
    let editandoId = null;

    function logout() { localStorage.clear(); window.location.href = '/'; }

    async function cargarAsistencia() {
      const params = new URLSearchParams();
      const q = document.getElementById('searchInput').value;
      const desde = document.getElementById('filtroDesde').value;
      const hasta = document.getElementById('filtroHasta').value;
      if (q) params.set('q', q);
      if (desde) params.set('fecha_desde', desde);
      if (hasta) params.set('fecha_hasta', hasta);
      const url = `/api/asistencia?${params.toString()}`;
      const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { logout(); return; }
      const data = await res.json();
      const tbody = document.getElementById('asistenciaTableBody');
      tbody.innerHTML = data.map(r => {
        const badgeColor = r.Estado_Asistencia === 'Presente' ? 'bg-green-100 text-green-700' : r.Estado_Asistencia === 'Justificado' ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700';
        return `<tr class="hover:bg-gray-50">
          <td class="px-4 py-3 text-sm font-medium text-gray-900">${r.Miembro_Nombre}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${r.Fecha}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${r.Tipo_Evento}</td>
          <td class="px-4 py-3"><span class="px-2 py-1 text-xs font-medium rounded-full ${badgeColor}">${r.Estado_Asistencia}</span></td>
          <td class="px-4 py-3 text-right">
            <button onclick="editarAsistencia(${r.ID_Asistencia})" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium mr-3">Editar</button>
            <button onclick="eliminarAsistencia(${r.ID_Asistencia})" class="text-red-600 hover:text-red-800 text-sm font-medium">Eliminar</button>
          </td>
        </tr>`;
      }).join('');
      document.getElementById('tableLoading').classList.add('hidden');
    }

    async function cargarMiembros() {
      try {
        const res = await fetch('/api/miembros', { headers: { Authorization: `Bearer ${token}` } });
        if (res.ok) {
          const miembros = await res.json();
          const sel = document.getElementById('ID_Miembro');
          sel.innerHTML = miembros.map(m => `<option value="${m.ID_Miembro}">${m.Nombres} ${m.Apellidos} (${m.Cedula})</option>`).join('');
        }
      } catch(e) {}
    }

    function abrirFormulario(data = null) {
      editandoId = data ? data.ID_Asistencia : null;
      document.getElementById('modalTitle').textContent = data ? 'Editar Registro' : 'Nuevo Registro de Asistencia';
      document.getElementById('ID_Miembro').value = data ? data.ID_Miembro : '';
      document.getElementById('Fecha').value = data ? data.Fecha : new Date().toISOString().split('T')[0];
      document.getElementById('Tipo_Evento').value = data ? data.Tipo_Evento : 'Culto Dominical';
      document.getElementById('Estado_Asistencia').value = data ? data.Estado_Asistencia : 'Presente';
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    function cerrarModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('modal').classList.remove('flex');
      editandoId = null;
    }

    async function guardarAsistencia() {
      const body = {
        ID_Miembro: parseInt(document.getElementById('ID_Miembro').value),
        Fecha: document.getElementById('Fecha').value,
        Tipo_Evento: document.getElementById('Tipo_Evento').value,
        Estado_Asistencia: document.getElementById('Estado_Asistencia').value,
      };
      const url = editandoId ? `/api/asistencia/${editandoId}` : '/api/asistencia';
      const res = await fetch(url, {
        method: editandoId ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(body),
      });
      if (!res.ok) { alert('Error al guardar'); return; }
      cerrarModal();
      cargarAsistencia();
    }

    async function editarAsistencia(id) {
      const res = await fetch(`/api/asistencia/${id}`, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) return;
      abrirFormulario(await res.json());
    }

    async function eliminarAsistencia(id) {
      if (!confirm('¿Eliminar este registro?')) return;
      const res = await fetch(`/api/asistencia/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { alert('Error al eliminar'); return; }
      cargarAsistencia();
    }

    document.getElementById('searchInput').addEventListener('input', e => cargarAsistencia());
    cargarMiembros();
    cargarAsistencia();
  </script>
</body>
</html>
