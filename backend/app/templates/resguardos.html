<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resguardos - SEDER</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex items-center gap-3">
          <a href="/dashboard" class="w-10 h-10 rounded-lg bg-indigo-600 flex items-center justify-center hover:bg-indigo-700">
            <span class="text-white font-bold text-lg">S</span>
          </a>
          <div>
            <h1 class="text-lg font-bold text-gray-900">Historial de Resguardos</h1>
            <p class="text-xs text-gray-500">Control de asignación y devolución de artículos</p>
          </div>
        </div>
        <button onclick="logout()" class="px-4 py-2 text-sm text-gray-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition">
          Cerrar Sesión
        </button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <div class="flex justify-between items-center mb-6">
      <div class="flex gap-3 flex-1 max-w-md">
        <input type="text" id="searchInput" placeholder="Buscar por artículo o miembro..."
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400 focus:border-transparent">
      </div>
      <button onclick="abrirFormulario()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition font-medium">
        + Nuevo Resguardo
      </button>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-gray-50 border-b">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Artículo</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Responsable</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Fecha Salida</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Dev. Prevista</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Estado Entrega</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Estado Devolución</th>
              <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase">Acciones</th>
            </tr>
          </thead>
          <tbody id="resguardosTableBody" class="divide-y divide-gray-100">
          </tbody>
        </table>
      </div>
      <div id="tableLoading" class="text-center py-8 text-gray-400">Cargando...</div>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 bg-black/50 hidden z-50 items-center justify-center">
    <div class="bg-white rounded-2xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">
      <div class="p-6 border-b">
        <h3 id="modalTitle" class="text-lg font-bold text-gray-900">Nuevo Resguardo</h3>
      </div>
      <form id="resguardoForm" class="p-6 space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Artículo *</label>
            <select id="ID_Articulo" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400"></select>
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Miembro Responsable *</label>
            <select id="ID_Miembro_Responsable" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400"></select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Salida</label>
            <input type="datetime-local" id="Fecha_Salida_Asignacion" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Fecha Devolución Prevista</label>
            <input type="date" id="Fecha_Devolucion_Prevista" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Estado de Entrega *</label>
            <select id="Estado_Entrega" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400">
              <option value="Entregado">Entregado</option>
              <option value="Pendiente">Pendiente</option>
              <option value="En Proceso">En Proceso</option>
              <option value="Cancelado">Cancelado</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Estado de Devolución</label>
            <select id="Estado_Devolucion" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400">
              <option value="">-- Sin definir --</option>
              <option value="Pendiente">Pendiente</option>
              <option value="Devuelto">Devuelto</option>
              <option value="Devuelto Parcial">Devuelto Parcial</option>
              <option value="Con Daños">Con Daños</option>
              <option value="Extraviado">Extraviado</option>
            </select>
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Notas / Observaciones</label>
            <textarea id="Notas_Observaciones" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-400"></textarea>
          </div>
        </div>
      </form>
      <div class="p-6 border-t bg-gray-50 flex justify-end gap-3 rounded-b-2xl">
        <button onclick="cerrarModal()" class="px-4 py-2 text-gray-700 hover:bg-gray-200 rounded-lg transition">Cancelar</button>
        <button onclick="guardarResguardo()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';

    let editandoId = null;
    let articuloFiltro = null;

    function logout() { localStorage.clear(); window.location.href = '/'; }

    async function cargarResguardos(q = '') {
      const params = new URLSearchParams();
      if (q) params.set('q', q);
      const url = `/api/resguardos?${params.toString()}`;
      const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
      if (!res.ok) { logout(); return; }
      const data = await res.json();
      const tbody = document.getElementById('resguardosTableBody');
      tbody.innerHTML = data.map(r => `
        <tr class="hover:bg-gray-50">
          <td class="px-4 py-3 text-sm font-medium text-gray-900">${r.Nombre_Articulo}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${r.Nombre_Miembro}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${r.Fecha_Salida_Asignacion ? new Date(r.Fecha_Salida_Asignacion).toLocaleString() : '-'}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${r.Fecha_Devolucion_Prevista || '-'}</td>
          <td class="px-4 py-3"><span class="px-2 py-1 text-xs font-medium rounded-full ${r.Estado_Entrega === 'Entregado' ? 'bg-green-100 text-green-700' : r.Estado_Entrega === 'Pendiente' ? 'bg-yellow-100 text-yellow-700' : r.Estado_Entrega === 'En Proceso' ? 'bg-blue-100 text-blue-700' : 'bg-red-100 text-red-700'}">${r.Estado_Entrega}</span></td>
          <td class="px-4 py-3 text-sm text-gray-600">${r.Estado_Devolucion || '-'}</td>
          <td class="px-4 py-3 text-right">
            <button onclick="editarResguardo(${r.ID_Resguardo})" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium mr-3">Editar</button>
            <button onclick="eliminarResguardo(${r.ID_Resguardo})" class="text-red-600 hover:text-red-800 text-sm font-medium">Eliminar</button>
          </td>
        </tr>
      `).join('');
      document.getElementById('tableLoading').classList.add('hidden');
    }

    async function cargarCatalogos() {
      const [articulos, miembros] = await Promise.all([
        fetch('/api/inventario', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()),
        fetch('/api/miembros', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()),
      ]);
      const selArt = document.getElementById('ID_Articulo');
      selArt.innerHTML = '<option value="">-- Seleccionar artículo --</option>' +
        articulos.map(a => `<option value="${a.ID_Articulo}">${a.Nombre_Articulo} ${a.Marca ? '- ' + a.Marca : ''}</option>`).join('');

      const selMiem = document.getElementById('ID_Miembro_Responsable');
      selMiem.innerHTML = '<option value="">-- Seleccionar miembro --</option>' +
        miembros.map(m => `<option value="${m.ID_Miembro}">${m.Nombres} ${m.Apellidos}</option>`).join('');
    }

    function abrirFormulario(data = null) {
      editandoId = data ? data.ID_Resguardo : null;
      document.getElementById('modalTitle').textContent = data ? 'Editar Resguardo' : 'Nuevo Resguardo';
      document.getElementById('ID_Articulo').value = data ? data.ID_Articulo : (articuloFiltro || '');
      document.getElementById('ID_Miembro_Responsable').value = data ? data.ID_Miembro_Responsable : '';
      document.getElementById('Fecha_Salida_Asignacion').value = data ? (data.Fecha_Salida_Asignacion ? new Date(data.Fecha_Salida_Asignacion).toISOString().slice(0, 16) : '') : '';
      document.getElementById('Fecha_Devolucion_Prevista').value = data ? (data.Fecha_Devolucion_Prevista || '') : '';
      document.getElementById('Estado_Entrega').value = data ? data.Estado_Entrega : 'Entregado';
      document.getElementById('Estado_Devolucion').value = data ? (data.Estado_Devolucion || '') : '';
      document.getElementById('Notas_Observaciones').value = data ? (data.Notas_Observaciones || '') : '';
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    function cerrarModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('modal').classList.remove('flex');
      editandoId = null;
    }

    async function guardarResguardo() {
      const body = {
        ID_Articulo: parseInt(document.getElementById('ID_Articulo').value),
        ID_Miembro_Responsable: parseInt(document.getElementById('ID_Miembro_Responsable').value),
        Fecha_Salida_Asignacion: document.getElementById('Fecha_Salida_Asignacion').value || null,
        Fecha_Devolucion_Prevista: document.getElementById('Fecha_Devolucion_Prevista').value || null,
        Estado_Entrega: document.getElementById('Estado_Entrega').value,
        Estado_Devolucion: document.getElementById('Estado_Devolucion').value || null,
        Notas_Observaciones: document.getElementById('Notas_Observaciones').value || null,
      };

      const url = editandoId ? `/api/resguardos/${editandoId}` : '/api/resguardos';
      const method = editandoId ? 'PUT' : 'POST';

      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body),
      });

      if (!res.ok) { alert('Error al guardar'); return; }
      cerrarModal();
      cargarResguardos(document.getElementById('searchInput').value);
    }

    async function editarResguardo(id) {
      const res = await fetch(`/api/resguardos/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (!res.ok) return;
      const data = await res.json();
      abrirFormulario(data);
    }

    async function eliminarResguardo(id) {
      if (!confirm('¿Eliminar este resguardo?')) return;
      const res = await fetch(`/api/resguardos/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
      if (!res.ok) { alert('Error al eliminar'); return; }
      cargarResguardos(document.getElementById('searchInput').value);
    }

    document.getElementById('searchInput').addEventListener('input', e => {
      cargarResguardos(e.target.value);
    });

    // Check for articulo_id filter from query param
    const params = new URLSearchParams(window.location.search);
    articuloFiltro = params.get('articulo_id');
    if (articuloFiltro) {
      document.getElementById('searchInput').placeholder = 'Filtrando por artículo ID ' + articuloFiltro + '...';
    }

    cargarCatalogos();
    cargarResguardos();
  </script>
</body>
</html>
