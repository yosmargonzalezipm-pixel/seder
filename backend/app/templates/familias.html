<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Familias - SEDER</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex items-center gap-3">
          <a href="/dashboard" class="w-10 h-10 rounded-lg bg-indigo-600 flex items-center justify-center hover:bg-indigo-700">
            <span class="text-white font-bold text-lg">S</span>
          </a>
          <div>
            <h1 class="text-lg font-bold text-gray-900">Familias</h1>
            <p class="text-xs text-gray-500">Gestión de núcleos familiares</p>
          </div>
        </div>
        <button onclick="logout()" class="px-4 py-2 text-sm text-gray-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition">Cerrar Sesión</button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <div class="flex justify-between items-center mb-6">
      <div class="flex gap-3 flex-1 max-w-md">
        <input type="text" id="searchInput" placeholder="Buscar por nombre..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:border-transparent">
      </div>
      <button onclick="abrirFormulario()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-medium">+ Nueva Familia</button>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-gray-50 border-b">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Nombre</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Cabeza de Familia</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Miembros</th>
              <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase">Acciones</th>
            </tr>
          </thead>
          <tbody id="familiasTableBody" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>
      <div id="tableLoading" class="text-center py-8 text-gray-400">Cargando...</div>
    </div>
  </main>

  <!-- Modal Nueva/Editar Familia -->
  <div id="modal" class="fixed inset-0 bg-black/50 hidden z-50 items-center justify-center">
    <div class="bg-white rounded-2xl w-full max-w-lg mx-4">
      <div class="p-6 border-b">
        <h3 id="modalTitle" class="text-lg font-bold text-gray-900">Nueva Familia</h3>
      </div>
      <form id="familiaForm" class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre de la Familia *</label>
          <input type="text" id="Nombre_Familia" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Cabeza de Familia (miembro)</label>
          <select id="ID_Cabeza_Familia" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
            <option value="">-- Sin asignar --</option>
          </select>
        </div>
      </form>
      <div class="p-6 border-t bg-gray-50 flex justify-end gap-3 rounded-b-2xl">
        <button onclick="cerrarModal()" class="px-4 py-2 text-gray-700 hover:bg-gray-200 rounded-lg transition">Cancelar</button>
        <button onclick="guardarFamilia()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal Gestionar Miembros -->
  <div id="modalMiembros" class="fixed inset-0 bg-black/50 hidden z-50 items-center justify-center">
    <div class="bg-white rounded-2xl w-full max-w-2xl mx-4 max-h-[80vh] flex flex-col">
      <div class="p-6 border-b flex justify-between items-center">
        <h3 class="text-lg font-bold text-gray-900">Gestionar Miembros</h3>
        <span id="modalMiembrosFamilia" class="text-sm text-gray-500"></span>
      </div>
      <div class="p-6 flex-1 overflow-y-auto">
        <div class="flex gap-2 mb-4">
          <select id="nuevoMiembroSelect" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
            <option value="">-- Seleccionar miembro --</option>
          </select>
          <select id="nuevoParentescoSelect" class="w-44 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
            <option value="">Sin parentesco</option>
          </select>
          <button onclick="agregarMiembro()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-medium whitespace-nowrap">Agregar</button>
        </div>
        <div id="miembrosLista">
          <p class="text-gray-400 text-center py-4" id="miembrosEmpty">Cargando miembros...</p>
        </div>
      </div>
      <div class="p-6 border-t bg-gray-50 flex justify-end gap-3 rounded-b-2xl">
        <button onclick="cerrarModalMiembros()" class="px-4 py-2 text-gray-700 hover:bg-gray-200 rounded-lg transition">Cerrar</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';
    let editandoId = null;
    let gestionandoFamiliaId = null;
    let gestionandoFamiliaNombre = '';

    function logout() { localStorage.clear(); window.location.href = '/'; }

    async function cargarFamilias(q = '') {
      const url = q ? `/api/familias?q=${encodeURIComponent(q)}` : '/api/familias';
      const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { logout(); return; }
      const data = await res.json();

      const tbody = document.getElementById('familiasTableBody');
      tbody.innerHTML = (await Promise.all(data.map(async f => {
        let miembrosStr = '';
        try {
          const miembrosRes = await fetch(`/api/familias/${f.ID_Familia}/miembros`, { headers: { Authorization: `Bearer ${token}` } });
          if (miembrosRes.ok) {
            const miembros = await miembrosRes.json();
            miembrosStr = miembros.map(m =>
              `${m.Nombres} ${m.Apellidos}${m.Parentesco ? ` (${m.Parentesco})` : ''}`
            ).join(', ');
          }
        } catch(e) {}
        return `<tr class="hover:bg-gray-50">
          <td class="px-4 py-3 text-sm font-medium text-gray-900">${f.Nombre_Familia}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${f.Cabeza_Familia_Nombre || '-'}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${miembrosStr || '—'}</td>
          <td class="px-4 py-3 text-right">
            <button onclick="editarFamilia(${f.ID_Familia})" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium mr-3">Editar</button>
            <button onclick="gestionarMiembros(${f.ID_Familia}, '${f.Nombre_Familia.replace(/'/g, "\\'")}')" class="text-emerald-600 hover:text-emerald-800 text-sm font-medium mr-3">Miembros</button>
            <button onclick="eliminarFamilia(${f.ID_Familia})" class="text-red-600 hover:text-red-800 text-sm font-medium">Eliminar</button>
          </td>
        </tr>`;
      }))).join('');
      document.getElementById('tableLoading').classList.add('hidden');
    }

    async function cargarMiembrosSelect() {
      try {
        const res = await fetch('/api/miembros', { headers: { Authorization: `Bearer ${token}` } });
        if (res.ok) {
          const miembros = await res.json();
          const sel = document.getElementById('ID_Cabeza_Familia');
          sel.innerHTML = '<option value="">-- Sin asignar --</option>' +
            miembros.map(m => `<option value="${m.ID_Miembro}">${m.Nombres} ${m.Apellidos} (${m.Cedula})</option>`).join('');
        }
      } catch(e) {}
    }

    // ---------- Gestionar Miembros ----------
    async function cargarParentescosSelect() {
      try {
        const res = await fetch('/api/catalogos/parentescos', { headers: { Authorization: `Bearer ${token}` } });
        if (res.ok) {
          const parentescos = await res.json();
          const sel = document.getElementById('nuevoParentescoSelect');
          sel.innerHTML = '<option value="">Sin parentesco</option>' +
            parentescos.map(p => `<option value="${p.value}">${p.label}</option>`).join('');
        }
      } catch(e) {}
    }

    async function cargarTodosMiembrosSelect() {
      try {
        const res = await fetch('/api/miembros', { headers: { Authorization: `Bearer ${token}` } });
        if (res.ok) {
          const miembros = await res.json();
          const sel = document.getElementById('nuevoMiembroSelect');
          sel.innerHTML = '<option value="">-- Seleccionar miembro --</option>' +
            miembros.map(m => `<option value="${m.ID_Miembro}">${m.Nombres} ${m.Apellidos} (${m.Cedula})</option>`).join('');
        }
      } catch(e) {}
    }

    async function gestionarMiembros(id, nombre) {
      gestionandoFamiliaId = id;
      gestionandoFamiliaNombre = nombre;
      document.getElementById('modalMiembrosFamilia').textContent = `Familia: ${nombre}`;
      document.getElementById('modalMiembros').classList.remove('hidden');
      document.getElementById('modalMiembros').classList.add('flex');
      await cargarParentescosSelect();
      await cargarTodosMiembrosSelect();
      await cargarMiembrosFamilia();
    }

    function cerrarModalMiembros() {
      document.getElementById('modalMiembros').classList.add('hidden');
      document.getElementById('modalMiembros').classList.remove('flex');
      gestionandoFamiliaId = null;
    }

    async function cargarMiembrosFamilia() {
      const div = document.getElementById('miembrosLista');
      try {
        const res = await fetch(`/api/familias/${gestionandoFamiliaId}/miembros`, { headers: { Authorization: `Bearer ${token}` } });
        if (!res.ok) { div.innerHTML = '<p class="text-gray-400 text-center py-4">Error al cargar miembros</p>'; return; }
        const miembros = await res.json();
        if (miembros.length === 0) {
          div.innerHTML = '<p class="text-gray-400 text-center py-4">Sin miembros asignados</p>';
          return;
        }
        div.innerHTML = miembros.map(m => `
          <div class="flex items-center justify-between py-2 px-3 hover:bg-gray-50 rounded-lg">
            <span class="text-sm text-gray-800">${m.Nombres} ${m.Apellidos} ${m.Parentesco ? `<span class="text-gray-400">(${m.Parentesco})</span>` : ''}</span>
            <button onclick="quitarMiembro(${m.ID_Miembro})" class="text-red-500 hover:text-red-700 text-sm font-medium">Quitar</button>
          </div>
        `).join('');
      } catch(e) {
        div.innerHTML = '<p class="text-gray-400 text-center py-4">Error al cargar</p>';
      }
    }

    async function agregarMiembro() {
      const miembroId = parseInt(document.getElementById('nuevoMiembroSelect').value);
      if (!miembroId) { alert('Seleccione un miembro'); return; }
      const parentescoId = parseInt(document.getElementById('nuevoParentescoSelect').value) || null;
      try {
        const res = await fetch(`/api/familias/${gestionandoFamiliaId}/miembros/${miembroId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ ID_Parentesco: parentescoId }),
        });
        if (!res.ok) { const err = await res.json(); alert(err.detail || 'Error al asignar miembro'); return; }
        document.getElementById('nuevoMiembroSelect').value = '';
        document.getElementById('nuevoParentescoSelect').value = '';
        await cargarMiembrosFamilia();
        cargarFamilias(document.getElementById('searchInput').value);
      } catch(e) { alert('Error al asignar miembro'); }
    }

    async function quitarMiembro(miembroId) {
      if (!confirm('¿Quitar este miembro de la familia?')) return;
      try {
        const res = await fetch(`/api/familias/${gestionandoFamiliaId}/miembros/${miembroId}`, {
          method: 'DELETE',
          headers: { Authorization: `Bearer ${token}` },
        });
        if (!res.ok) { const err = await res.json(); alert(err.detail || 'Error al quitar miembro'); return; }
        await cargarMiembrosFamilia();
        cargarFamilias(document.getElementById('searchInput').value);
      } catch(e) { alert('Error al quitar miembro'); }
    }

    // ---------- CRUD Familia ----------
    function abrirFormulario(data = null) {
      editandoId = data ? data.ID_Familia : null;
      document.getElementById('modalTitle').textContent = data ? 'Editar Familia' : 'Nueva Familia';
      document.getElementById('Nombre_Familia').value = data ? data.Nombre_Familia : '';
      document.getElementById('ID_Cabeza_Familia').value = data ? (data.ID_Cabeza_Familia || '') : '';
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    function cerrarModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('modal').classList.remove('flex');
      editandoId = null;
    }

    async function guardarFamilia() {
      const body = {
        Nombre_Familia: document.getElementById('Nombre_Familia').value,
        ID_Cabeza_Familia: parseInt(document.getElementById('ID_Cabeza_Familia').value) || null,
      };
      const url = editandoId ? `/api/familias/${editandoId}` : '/api/familias';
      const res = await fetch(url, {
        method: editandoId ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(body),
      });
      if (!res.ok) { alert('Error al guardar'); return; }
      cerrarModal();
      cargarFamilias(document.getElementById('searchInput').value);
    }

    async function editarFamilia(id) {
      const res = await fetch(`/api/familias/${id}`, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) return;
      abrirFormulario(await res.json());
    }

    async function eliminarFamilia(id) {
      if (!confirm('¿Eliminar esta familia?')) return;
      const res = await fetch(`/api/familias/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { const err = await res.json(); alert(err.detail || 'Error al eliminar'); return; }
      cargarFamilias(document.getElementById('searchInput').value);
    }

    document.getElementById('searchInput').addEventListener('input', e => cargarFamilias(e.target.value));
    cargarMiembrosSelect();
    cargarFamilias();
  </script>
</body>
</html>
