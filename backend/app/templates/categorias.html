<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorías de Inventario - SEDER</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex items-center gap-3">
          <a href="/dashboard" class="w-10 h-10 rounded-lg bg-indigo-600 flex items-center justify-center hover:bg-indigo-700">
            <span class="text-white font-bold text-lg">S</span>
          </a>
          <div>
            <h1 class="text-lg font-bold text-gray-900">Categorías de Inventario</h1>
            <p class="text-xs text-gray-500">Gestión de categorías para artículos del inventario</p>
          </div>
        </div>
        <button onclick="logout()" class="px-4 py-2 text-sm text-gray-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition">Cerrar Sesión</button>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <div class="flex justify-between items-center mb-6">
      <div class="flex gap-3 flex-1 max-w-md">
        <input type="text" id="searchInput" placeholder="Buscar categoría..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:border-transparent">
      </div>
      <button onclick="abrirFormulario()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-medium">+ Nueva Categoría</button>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-gray-50 border-b">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">ID</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Nombre</th>
              <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase">Acciones</th>
            </tr>
          </thead>
          <tbody id="categoriasTableBody" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>
      <div id="tableLoading" class="text-center py-8 text-gray-400">Cargando...</div>
    </div>
  </main>

  <div id="modal" class="fixed inset-0 bg-black/50 hidden z-50 items-center justify-center">
    <div class="bg-white rounded-2xl w-full max-w-md mx-4">
      <div class="p-6 border-b">
        <h3 id="modalTitle" class="text-lg font-bold text-gray-900">Nueva Categoría</h3>
      </div>
      <form id="categoriaForm" class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
          <input type="text" id="Nombre_Categoria" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
        </div>
      </form>
      <div class="p-6 border-t bg-gray-50 flex justify-end gap-3 rounded-b-2xl">
        <button onclick="cerrarModal()" class="px-4 py-2 text-gray-700 hover:bg-gray-200 rounded-lg transition">Cancelar</button>
        <button onclick="guardarCategoria()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';
    let editandoId = null;

    function logout() { localStorage.clear(); window.location.href = '/'; }

    async function cargarCategorias(q = '') {
      const url = q ? `/api/categorias?q=${encodeURIComponent(q)}` : '/api/categorias';
      const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { logout(); return; }
      const data = await res.json();
      document.getElementById('categoriasTableBody').innerHTML = data.map(c => `
        <tr class="hover:bg-gray-50">
          <td class="px-4 py-3 text-sm text-gray-500">${c.ID}</td>
          <td class="px-4 py-3 text-sm font-medium text-gray-900">${c.Nombre}</td>
          <td class="px-4 py-3 text-right">
            <button onclick="editarCategoria(${c.ID})" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium mr-3">Editar</button>
            <button onclick="eliminarCategoria(${c.ID})" class="text-red-600 hover:text-red-800 text-sm font-medium">Eliminar</button>
          </td>
        </tr>
      `).join('');
      document.getElementById('tableLoading').classList.add('hidden');
    }

    function abrirFormulario(data = null) {
      editandoId = data ? data.ID : null;
      document.getElementById('modalTitle').textContent = data ? 'Editar Categoría' : 'Nueva Categoría';
      document.getElementById('Nombre_Categoria').value = data ? data.Nombre : '';
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    function cerrarModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('modal').classList.remove('flex');
      editandoId = null;
    }

    async function guardarCategoria() {
      const body = { Nombre: document.getElementById('Nombre_Categoria').value };
      const url = editandoId ? `/api/categorias/${editandoId}` : '/api/categorias';
      const res = await fetch(url, {
        method: editandoId ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(body),
      });
      if (!res.ok) { alert('Error al guardar'); return; }
      cerrarModal();
      cargarCategorias(document.getElementById('searchInput').value);
    }

    async function editarCategoria(id) {
      const res = await fetch(`/api/categorias/${id}`, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) return;
      abrirFormulario(await res.json());
    }

    async function eliminarCategoria(id) {
      if (!confirm('¿Eliminar esta categoría?')) return;
      const res = await fetch(`/api/categorias/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { alert('Error al eliminar'); return; }
      cargarCategorias(document.getElementById('searchInput').value);
    }

    document.getElementById('searchInput').addEventListener('input', e => cargarCategorias(e.target.value));
    cargarCategorias();
  </script>
</body>
</html>
