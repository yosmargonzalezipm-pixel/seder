<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miembros - SEDER</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex items-center gap-3">
          <a href="/dashboard" class="w-10 h-10 rounded-lg bg-indigo-600 flex items-center justify-center hover:bg-indigo-700">
            <span class="text-white font-bold text-lg">S</span>
          </a>
          <div>
            <h1 class="text-lg font-bold text-gray-900">Miembros</h1>
            <p class="text-xs text-gray-500">Gestión de miembros de la iglesia</p>
          </div>
        </div>
        <button onclick="logout()" class="px-4 py-2 text-sm text-gray-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition">
          Cerrar Sesión
        </button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <div class="flex justify-between items-center mb-6">
      <div class="flex gap-3 flex-1 max-w-md">
        <input type="text" id="searchInput" placeholder="Buscar por cédula, nombres..."
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:border-transparent">
      </div>
      <button id="btnNuevo" onclick="abrirFormulario()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-medium">
        + Nuevo Miembro
      </button>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-gray-50 border-b">
            <tr>
              <th class="px-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Cédula</th>
              <th class="px-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Nombres</th>
              <th class="px-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Apellidos</th>
              <th class="px-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Sexo</th>
              <th class="px-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Estado Civil</th>
              <th class="px-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Profesiones</th>
              <th class="px-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Teléfono</th>
              <th class="px-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Correo</th>
              <th class="px-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Iglesia</th>
              <th class="px-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Estado</th>
              <th class="px-3 py-3 text-right text-xs font-semibold text-gray-500 uppercase">Acciones</th>
            </tr>
          </thead>
          <tbody id="miembrosTableBody" class="divide-y divide-gray-100">
          </tbody>
        </table>
      </div>
      <div id="tableLoading" class="text-center py-8 text-gray-400">Cargando...</div>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 bg-black/50 hidden z-50 items-center justify-center">
    <div class="bg-white rounded-2xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">
      <div class="p-6 border-b">
        <h3 id="modalTitle" class="text-lg font-bold text-gray-900">Nuevo Miembro</h3>
      </div>
      <form id="miembroForm" class="p-6 space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Cédula *</label>
            <input type="text" id="Cedula" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Estado</label>
            <select id="Estado" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
              <option value="Activo">Activo</option>
              <option value="Inactivo">Inactivo</option>
              <option value="Visitante">Visitante</option>
              <option value="Trasladado">Trasladado</option>
              <option value="Excomulgado">Excomulgado</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nombres *</label>
            <input type="text" id="Nombres" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Apellidos *</label>
            <input type="text" id="Apellidos" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
            <input type="text" id="Telefono" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
            <input type="email" id="Correo_Electronico" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Sexo</label>
            <select id="Sexo" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
              <option value="">Seleccione...</option>
              <option value="M">Masculino</option>
              <option value="F">Femenino</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Nacimiento</label>
            <input type="date" id="Fecha_Nacimiento" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Estado Civil</label>
            <select id="Estado_Civil" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
              <option value="">Seleccione...</option>
              <option value="Soltero">Soltero</option>
              <option value="Casado">Casado</option>
              <option value="Divorciado">Divorciado</option>
              <option value="Viudo">Viudo</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Iglesia *</label>
            <select id="ID_Iglesia" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400"></select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Bautismo</label>
            <input type="date" id="Fecha_Bautismo" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Conversión</label>
            <input type="date" id="Fecha_Conversion" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Familia</label>
            <select id="ID_Familia" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400"><option value="">Seleccione...</option></select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Ciudad *</label>
            <select id="ID_Ciudad" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400"></select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Parroquia *</label>
            <select id="ID_Parroquia" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400"></select>
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Dirección</label>
            <textarea id="Direccion" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400"></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Profesiones</label>
            <select id="Profesiones" multiple class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 min-h-[90px]"></select>
            <p class="text-xs text-gray-400 mt-1">Ctrl+clic para seleccionar varias</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Oficios</label>
            <select id="Oficios" multiple class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 min-h-[90px]"></select>
            <p class="text-xs text-gray-400 mt-1">Ctrl+clic para seleccionar varias</p>
          </div>
        </div>
      </form>
      <div class="p-6 border-t bg-gray-50 flex justify-end gap-3 rounded-b-2xl">
        <button onclick="cerrarModal()" class="px-4 py-2 text-gray-700 hover:bg-gray-200 rounded-lg transition">Cancelar</button>
        <button onclick="guardarMiembro()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';

    let editandoId = null;

    function logout() { localStorage.clear(); window.location.href = '/'; }

    async function cargarMiembros(q = '') {
      const url = q ? `/api/miembros?q=${encodeURIComponent(q)}` : '/api/miembros';
      const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
      if (!res.ok) { logout(); return; }
      const data = await res.json();
      const tbody = document.getElementById('miembrosTableBody');
      tbody.innerHTML = data.map(m => `
        <tr class="hover:bg-gray-50">
          <td class="px-3 py-3 text-sm font-medium text-gray-900">${m.Cedula}</td>
          <td class="px-3 py-3 text-sm text-gray-600">${m.Nombres}</td>
          <td class="px-3 py-3 text-sm text-gray-600">${m.Apellidos}</td>
          <td class="px-3 py-3 text-sm text-gray-600">${m.Sexo === 'M' ? 'Masc.' : m.Sexo === 'F' ? 'Fem.' : '-'}</td>
          <td class="px-3 py-3 text-sm text-gray-600">${m.Estado_Civil || '-'}</td>
          <td class="px-3 py-3 text-sm text-gray-600 max-w-[120px] truncate" title="${(m.Profesiones||[]).join(', ')}">${(m.Profesiones||[]).join(', ') || '-'}</td>
          <td class="px-3 py-3 text-sm text-gray-600">${m.Telefono || '-'}</td>
          <td class="px-3 py-3 text-sm text-gray-600 max-w-[140px] truncate" title="${m.Correo_Electronico || ''}">${m.Correo_Electronico || '-'}</td>
          <td class="px-3 py-3 text-sm text-gray-600">${m.Iglesia || '-'}</td>
          <td class="px-3 py-3"><span class="px-2 py-1 text-xs font-medium rounded-full ${m.Estado === 'Activo' ? 'bg-green-100 text-green-700' : m.Estado === 'Inactivo' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700'}">${m.Estado}</span></td>
          <td class="px-3 py-3 text-right whitespace-nowrap">
            <button onclick="editarMiembro(${m.ID_Miembro})" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium mr-2">Editar</button>
            <button onclick="eliminarMiembro(${m.ID_Miembro})" class="text-red-600 hover:text-red-800 text-sm font-medium">Eliminar</button>
          </td>
        </tr>
      `).join('');
      document.getElementById('tableLoading').classList.add('hidden');
    }

    async function cargarCatalogos() {
      const [iglesias, familias, ciudades, parroquias, profesiones, oficios] = await Promise.all([
        fetch('/api/catalogos/iglesias', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()),
        fetch('/api/catalogos/familias', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()),
        fetch('/api/catalogos/ciudades', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()),
        fetch('/api/catalogos/parroquias', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()),
        fetch('/api/catalogos/profesiones', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()),
        fetch('/api/catalogos/oficios', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()),
      ]);
      document.getElementById('ID_Iglesia').innerHTML = iglesias.map(i => `<option value="${i.value}">${i.label}</option>`).join('');
      document.getElementById('ID_Familia').innerHTML = '<option value="">Seleccione...</option>' + familias.map(f => `<option value="${f.value}">${f.label}</option>`).join('');
      document.getElementById('ID_Ciudad').innerHTML = ciudades.map(c => `<option value="${c.value}">${c.label}</option>`).join('');
      document.getElementById('ID_Parroquia').innerHTML = parroquias.map(p => `<option value="${p.value}">${p.label}</option>`).join('');
      window._profesionesCat = profesiones;
      window._oficiosCat = oficios;
      document.getElementById('Profesiones').innerHTML = profesiones.map(p => `<option value="${p.ID}">${p.Nombre}</option>`).join('');
      document.getElementById('Oficios').innerHTML = oficios.map(o => `<option value="${o.ID}">${o.Nombre}</option>`).join('');
    }

    function abrirFormulario(data = null) {
      editandoId = data ? data.ID_Miembro : null;
      document.getElementById('modalTitle').textContent = data ? 'Editar Miembro' : 'Nuevo Miembro';
      document.getElementById('Nombres').value = data ? data.Nombres : '';
      document.getElementById('Apellidos').value = data ? data.Apellidos : '';
      document.getElementById('Cedula').value = data ? data.Cedula : '';
      document.getElementById('Telefono').value = data ? (data.Telefono || '') : '';
      document.getElementById('Correo_Electronico').value = data ? (data.Correo_Electronico || '') : '';
      document.getElementById('Sexo').value = data ? (data.Sexo || '') : '';
      document.getElementById('Fecha_Nacimiento').value = data ? (data.Fecha_Nacimiento || '') : '';
      document.getElementById('Estado_Civil').value = data ? (data.Estado_Civil || '') : '';
      document.getElementById('Fecha_Bautismo').value = data ? (data.Fecha_Bautismo || '') : '';
      document.getElementById('Fecha_Conversion').value = data ? (data.Fecha_Conversion || '') : '';
      document.getElementById('ID_Familia').value = data ? (data.ID_Familia || '') : '';
      document.getElementById('ID_Ciudad').value = data ? (data.ID_Ciudad || '') : '';
      document.getElementById('ID_Parroquia').value = data ? (data.ID_Parroquia || '') : '';
      document.getElementById('Direccion').value = data ? (data.Direccion || '') : '';
      document.getElementById('Estado').value = data ? data.Estado : 'Activo';
      // Seleccionar profesiones y oficios
      const profSel = document.getElementById('Profesiones');
      const ofiSel = document.getElementById('Oficios');
      [...profSel.options].forEach(o => o.selected = data && data.Profesiones && data.Profesiones.includes(o.text));
      [...ofiSel.options].forEach(o => o.selected = data && data.Oficios && data.Oficios.includes(o.text));
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    function cerrarModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('modal').classList.remove('flex');
      editandoId = null;
    }

    async function guardarMiembro() {
      const body = {
        ID_Iglesia: parseInt(document.getElementById('ID_Iglesia').value) || 1,
        Cedula: document.getElementById('Cedula').value,
        Nombres: document.getElementById('Nombres').value,
        Apellidos: document.getElementById('Apellidos').value,
        Telefono: document.getElementById('Telefono').value || null,
        Correo_Electronico: document.getElementById('Correo_Electronico').value || null,
        Sexo: document.getElementById('Sexo').value || null,
        Fecha_Nacimiento: document.getElementById('Fecha_Nacimiento').value || null,
        Estado_Civil: document.getElementById('Estado_Civil').value || null,
        Fecha_Bautismo: document.getElementById('Fecha_Bautismo').value || null,
        Fecha_Conversion: document.getElementById('Fecha_Conversion').value || null,
        ID_Familia: parseInt(document.getElementById('ID_Familia').value) || null,
        ID_Ciudad: parseInt(document.getElementById('ID_Ciudad').value) || 1,
        ID_Parroquia: parseInt(document.getElementById('ID_Parroquia').value) || 1,
        Direccion: document.getElementById('Direccion').value || null,
        Estado: document.getElementById('Estado').value,
      };

      const url = editandoId ? `/api/miembros/${editandoId}` : '/api/miembros';
      const method = editandoId ? 'PUT' : 'POST';

      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body),
      });

      if (!res.ok) { alert('Error al guardar'); return; }
      const saved = await res.json();
      // Guardar profesiones y oficios
      const profIds = [...document.getElementById('Profesiones').selectedOptions].map(o => parseInt(o.value));
      const ofiIds = [...document.getElementById('Oficios').selectedOptions].map(o => parseInt(o.value));
      await Promise.all([
        fetch(`/api/miembros/${saved.ID_Miembro}/profesiones`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ profesiones: profIds }),
        }),
        fetch(`/api/miembros/${saved.ID_Miembro}/oficios`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ oficios: ofiIds }),
        }),
      ]);
      cerrarModal();
      cargarMiembros(document.getElementById('searchInput').value);
    }

    async function editarMiembro(id) {
      const res = await fetch(`/api/miembros/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (!res.ok) return;
      const data = await res.json();
      abrirFormulario(data);
    }

    async function eliminarMiembro(id) {
      if (!confirm('¿Eliminar este miembro?')) return;
      const res = await fetch(`/api/miembros/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
      if (!res.ok) { alert('Error al eliminar'); return; }
      cargarMiembros(document.getElementById('searchInput').value);
    }

    document.getElementById('searchInput').addEventListener('input', e => {
      cargarMiembros(e.target.value);
    });

    cargarCatalogos();
    cargarMiembros();
  </script>
</body>
</html>
