<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ settings.APP_NAME }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/login.css">
</head>
<body class="min-h-screen flex items-center justify-center" style="background:linear-gradient(135deg, #0C0A1E, #1E0A3C, #2D1040);">
  <div class="absolute inset-0 bg-black/20"></div>

  <div class="relative z-10 w-full max-w-md px-6">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-white/10 backdrop-blur-sm mb-4 border border-white/20">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-white tracking-tight">SEDER</h1>
      <p class="text-violet-200 mt-1 text-sm">Sistema de registro - Iglesia Dios es Amor, Tipuro.</p>
    </div>

    <div class="bg-white/10 backdrop-blur-xl rounded-2xl p-8 shadow-2xl border border-white/20">
      <form id="loginForm" class="space-y-5">
        <div id="errorMessage" class="hidden bg-red-500/20 border border-red-400/30 text-red-200 px-4 py-3 rounded-lg text-sm"></div>

        <div>
          <label class="block text-sm font-medium text-violet-100 mb-1.5">Usuario o Email</label>
          <input type="text" id="usuario" name="usuario" required
            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-violet-200/50 focus:outline-none focus:ring-2 focus:ring-violet-400 focus:border-transparent transition"
            placeholder="Ingrese su usuario">
        </div>

        <div>
          <label class="block text-sm font-medium text-violet-100 mb-1.5">Contraseña</label>
          <input type="password" id="password" name="password" required
            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-violet-200/50 focus:outline-none focus:ring-2 focus:ring-violet-400 focus:border-transparent transition"
            placeholder="Ingrese su contraseña">
        </div>

        <button type="submit"
          class="w-full py-3 px-4 bg-gradient-to-r from-violet-500 to-violet-600 hover:from-violet-600 hover:to-violet-700 text-white font-semibold rounded-lg shadow-lg hover:shadow-xl transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
          Iniciar Sesión
        </button>
      </form>
    </div>

    <p class="text-center text-violet-300/60 text-xs mt-6">SEDER v1.0.0</p>
  </div>

  <script src="/static/js/login.js"></script>
</body>
</html>
