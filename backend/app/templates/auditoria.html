<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auditoría - SEDER</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex items-center gap-3">
          <a href="/dashboard" class="w-10 h-10 rounded-lg bg-indigo-600 flex items-center justify-center hover:bg-indigo-700">
            <span class="text-white font-bold text-lg">S</span>
          </a>
          <div>
            <h1 class="text-lg font-bold text-gray-900">Auditoría</h1>
            <p class="text-xs text-gray-500">Registro de actividades del sistema</p>
          </div>
        </div>
        <button onclick="logout()" class="px-4 py-2 text-sm text-gray-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition">Cerrar Sesión</button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <div class="flex flex-wrap gap-3 items-center justify-between mb-6">
      <div class="flex gap-3 flex-1 max-w-md">
        <input type="text" id="searchInput" placeholder="Buscar en detalle..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:border-transparent">
      </div>
      <div class="flex gap-2 items-center flex-wrap">
        <select id="filtroAccion" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
          <option value="">Todas las acciones</option>
        </select>
        <select id="filtroTabla" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
          <option value="">Todas las tablas</option>
        </select>
        <input type="date" id="filtroDesde" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
        <input type="date" id="filtroHasta" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
        <button onclick="cargarAuditoria()" class="px-3 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm">Filtrar</button>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-gray-50 border-b">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Fecha/Hora</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Usuario</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Acción</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Tabla</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">ID Registro</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Detalle</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">IP</th>
            </tr>
          </thead>
          <tbody id="auditoriaTableBody" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>
      <div id="tableLoading" class="text-center py-8 text-gray-400">Cargando...</div>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';

    function logout() { localStorage.clear(); window.location.href = '/'; }

    async function cargarFiltros() {
      try {
        const res = await fetch('/api/auditoria/acciones', { headers: { Authorization: `Bearer ${token}` } });
        if (res.ok) {
          const acciones = await res.json();
          const selAccion = document.getElementById('filtroAccion');
          const selTabla = document.getElementById('filtroTabla');
          const tablas = new Set();
          acciones.forEach(a => {
            selAccion.innerHTML += `<option value="${a.accion}">${a.accion} (${a.total})</option>`;
          });
        }
      } catch(e) {}
    }

    async function cargarAuditoria() {
      const params = new URLSearchParams();
      const q = document.getElementById('searchInput').value;
      const accion = document.getElementById('filtroAccion').value;
      const tabla = document.getElementById('filtroTabla').value;
      const desde = document.getElementById('filtroDesde').value;
      const hasta = document.getElementById('filtroHasta').value;
      if (q) params.set('q', q);
      if (accion) params.set('accion', accion);
      if (tabla) params.set('tabla', tabla);
      if (desde) params.set('desde', desde);
      if (hasta) params.set('hasta', hasta);

      const res = await fetch(`/api/auditoria?${params.toString()}`, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { logout(); return; }
      const data = await res.json();

      const tbody = document.getElementById('auditoriaTableBody');
      tbody.innerHTML = data.map(a => {
        const fecha = a.Fecha_Hora ? new Date(a.Fecha_Hora).toLocaleString('es-VE') : '-';
        const tablasSet = new Set();
        if (a.Tabla_Afectada) tablasSet.add(a.Tabla_Afectada);
        return `<tr class="hover:bg-gray-50 text-sm">
          <td class="px-4 py-3 text-gray-600 whitespace-nowrap">${fecha}</td>
          <td class="px-4 py-3 font-medium text-gray-900">${a.Usuario_Nombre}</td>
          <td class="px-4 py-3"><span class="px-2 py-0.5 text-xs font-medium rounded-full bg-indigo-50 text-indigo-700">${a.Accion}</span></td>
          <td class="px-4 py-3 text-gray-600">${a.Tabla_Afectada || '-'}</td>
          <td class="px-4 py-3 text-gray-600">${a.ID_Registro_Afectado || '-'}</td>
          <td class="px-4 py-3 text-gray-500 max-w-xs truncate">${a.Detalle || '-'}</td>
          <td class="px-4 py-3 text-gray-500 text-xs">${a.Direccion_IP || '-'}</td>
        </tr>`;
      }).join('');
      document.getElementById('tableLoading').classList.add('hidden');
    }

    document.getElementById('searchInput').addEventListener('input', e => cargarAuditoria());
    cargarFiltros();
    cargarAuditoria();
  </script>
</body>
</html>
