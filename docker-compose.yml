services:
  mysql:
    image: mysql:8.0
    container_name: seder_mysql
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: seder_backend
    restart: unless-stopped
    ports:
      - "8086:8000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: seder_user
      DB_PASSWORD: seder_pass
      DB_NAME: seder
      JWT_SECRET: ${JWT_SECRET:-supersecretkeychangeinproduction}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: seder_phpmyadmin
    restart: unless-stopped
    ports:
      - "8085:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 100M
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
